name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install pywebview pyinstaller

      - name: EXE oluştur
        run: pyinstaller app.spec

      - name: Artifacts'e yükle
        uses: actions/upload-artifact@v4
        with:
          name: PdfExcelPro-Windows
          path: dist/PdfExcelPro.exe
          retention-days: 90

      - name: Release yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PDF Excel Pro v${{ github.run_number }}"
          body: "Levent Emirhan Özhan tarafından geliştirilmiştir."
          files: dist/PdfExcelPro.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
